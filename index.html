<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>Drift</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">
  <header>
    <h1>Drift</h1>
    <p class="tagline">Mix ambient sound layers</p>
    <p class="status" id="status">No layers active</p>
  </header>

  <div class="actions">
    <button class="action" id="randomize">Randomize</button>
    <button class="action" id="livemix" aria-pressed="false">Live Mix<span class="live-dot"></span></button>
    <button class="action" id="reset">Reset</button>
  </div>

  <div id="catalog"></div>
  <p class="credit">Streaming previews from Freesound.org (CC0/CC-BY recordings; full credits in source). Noise &amp; tone layers are generated locally.</p>
</div>

<script src="script.js"></script>

</body>
</html>
